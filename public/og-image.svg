<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glow circles -->
  <circle cx="200" cy="315" r="200" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1000" cy="315" r="200" fill="#8b5cf6" opacity="0.1"/>
  
  <!-- Certificate Icon -->
  <g transform="translate(540, 180)">
    <rect x="0" y="0" width="120" height="140" rx="8" fill="#1e293b" stroke="url(#accent)" stroke-width="3"/>
    <rect x="20" y="20" width="80" height="10" rx="2" fill="#3b82f6" opacity="0.6"/>
    <rect x="20" y="40" width="60" height="8" rx="2" fill="#64748b" opacity="0.5"/>
    <rect x="20" y="55" width="70" height="8" rx="2" fill="#64748b" opacity="0.5"/>
    <circle cx="60" cy="100" r="25" fill="url(#accent)"/>
    <path d="M50 100 L58 108 L72 92" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">ECERTIFPRO</text>
  <text x="600" y="430" font-family="Arial, sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">المنصة الرسمية لشهادات لغة المرجع</text>
  
  <!-- Badge -->
  <rect x="450" y="460" width="300" height="40" rx="20" fill="url(#accent)" opacity="0.2"/>
  <text x="600" y="487" font-family="Arial, sans-serif" font-size="16" fill="#a5b4fc" text-anchor="middle">أول لغة برمجة AI-أصيلة بالعربية</text>
  
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
